version: 0

# Agent timeout settings
timeout_seconds: 36000
python_path: python3

# num_parallel and --gpu-ids in `run.configs` are overridden at launch time by
# (priority): GEAK_NUM_PARALLEL env > top-level eval num_parallel > value below.
# Default (when nothing set): len(gpu_ids). gwiab-scheduler branch of GEAK
# supports >1 subagent per GPU.
# num_parallel: 4

run:
  configs: '-c geak.yaml --yolo --num-parallel=2 --gpu-ids=0,1'
