version: 0
timeout_seconds: 10800

# Number of parallel GEAK subagents.
# Override priority: GEAK_NUM_PARALLEL env > top-level eval config num_parallel > this > len(gpu_ids).
# With the gwiab-scheduler branch of GEAK, you can run >1 subagent per GPU.
num_parallel: 4

# Wall-clock budget profile forwarded to geak CLI as --mode ('quick' ~1h/kernel, 'full' ~2h/kernel).
# Override priority: GEAK_RUN_MODE env > top-level eval config run_mode > this > geak.yaml default.
run_mode: full

geak_env:
  GEAK_MAX_ROUNDS: "5"
  GEAK_EARLY_STOP_THRESHOLD: "-1"
  GEAK_AGENT_STEP_LIMIT: "200"
  GEAK_TASKGEN_STEP_LIMIT: "200"
  GEAK_ORCHESTRATOR_STEP_LIMIT: "200"
  GEAK_MODEL: "claude-opus-4.6"
  GEAK_BENCHMARK_ITERATIONS: "30"
