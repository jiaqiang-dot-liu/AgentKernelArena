backend: codex                # claude_code | codex | cursor
timeout_seconds: 1200         # 0 means no timeout; run until validator backend exits
# null -> auto-use the framework-detected interpreter (AGENT_KERNEL_ARENA_PYTHON),
# which is correct inside the Docker container (e.g. /opt/venv/bin/python).
python_path: null

# Optional model settings for the active backend.
# codex:       model -> `codex exec --model`, effort -> `model_reasoning_effort`.
# claude_code: model -> `claude --model`,      effort -> `claude --effort`.
# Example Claude Sonnet config: backend: claude_code, model: sonnet, effort: max.
model: gpt-5.5
effort: xhigh

# Per-command timeouts (seconds) for each validation check
compile_timeout: 600
correctness_timeout: 600
performance_timeout: 600
