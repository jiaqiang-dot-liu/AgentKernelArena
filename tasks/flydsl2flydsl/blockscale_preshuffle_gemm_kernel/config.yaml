task_type: flydsl2flydsl
source_file_path:
  - kernel.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 -c "from kernel import compile_blockscale_preshuffle_gemm; compile_blockscale_preshuffle_gemm(M=256,N=256,K=256,tile_m=32,tile_n=64,tile_k=256,scale_block_k=128,out_dtype='bf16',use_async_copy=False); print('compile ok')"
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - compile_blockscale_preshuffle_gemm
source_origin:
  repo: https://github.com/ROCm/FlyDSL
  path: kernels/blockscale_preshuffle_gemm.py
  commit: ad1d4a507603b0524318be0fa3f076c31b676e3d
  date: 2026-06-21
prompt:
  instructions: |
    Optimize the FlyDSL blockscale preshuffle FP8 GEMM for AMD MI300X-class CDNA GPUs
    (per-block scales, MFMA, optional async copy on supported arch).
    You MUST keep the kernel in FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.
    You MUST NOT add FastLauncher, ctypes dispatch bypass, _call_state_cache extraction,
    or any wrapper that bypasses JitFunction.__call__. Only optimize the GPU kernel
    computation itself.
