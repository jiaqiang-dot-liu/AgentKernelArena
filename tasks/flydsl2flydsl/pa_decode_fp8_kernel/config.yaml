task_type: flydsl2flydsl
source_file_path:
  - kernel.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 -c "from kernel import compile_pa_decode_ps; compile_pa_decode_ps(query_input_dtype='bf16'); print('compile ok')"
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - compile_pa_decode_ps
  - get_pa_metadata
  - get_sw_ps_max_context_partition_num
  - pa_decode_ps_launch
source_origin:
  repo: https://github.com/ROCm/FlyDSL
  path: kernels/pa_decode_fp8.py
  commit: 28a18d328b4882c999864b2df2f8f9fe3fcc8b47
  date: 2026-06-01  # v0.2.0 (28a18d3)
prompt:
  instructions: |
    Optimize the FlyDSL Paged Attention Decode FP8 kernel for AMD MI300X GPU.
    The kernel implements paged KV-cache attention decode with FP8 quantized
    keys/values, MFMA-based dot products, online softmax, multi-partition
    reduce, and supports both one-shot and split-reduce modes.
    You MUST keep the kernel in FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.

platform_support:
  # Requires `aiter` available in the environment (fp8 KV quant +
  # paged-attention metadata/reduce reference). All other gfx942 tasks need
  # only FlyDSL. The standard FlyDSL validation image does not ship aiter, so
  # this task is marked `skip` for the default gate (like the gfx950-only
  # tasks): it compiles + passes correctness/performance only in an
  # aiter-enabled runtime. Self-containment intentionally fails (external aiter
  # import), which is why it is excluded from the active set rather than active.
  required_arch: gfx942
  runnable_on_gfx942: true
  requires_aiter: true
  status: skip
  skip_reason: |
    Requires the external AMD aiter runtime for fp8 KV quantization and
    paged-attention metadata/reduce helpers. It can run on gfx942 in an
    aiter-enabled image, but is excluded from the default self-contained gate.
