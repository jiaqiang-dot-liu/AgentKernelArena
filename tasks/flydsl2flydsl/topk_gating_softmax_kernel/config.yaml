task_type: flydsl2flydsl
source_file_path:
  - kernel.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 -c "from kernel import build_topk_gating_softmax_module; build_topk_gating_softmax_module(128, 8, 'bf16'); print('compile ok')"
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - build_topk_gating_softmax_module
source_origin:
  repo: https://github.com/ROCm/FlyDSL
  path: kernels/topk_gating_softmax_kernel.py
  commit: 28a18d328b4882c999864b2df2f8f9fe3fcc8b47
  date: 2026-06-01  # v0.2.0 (28a18d3)
prompt:
  instructions: |
    Optimize the FlyDSL fused TopK gating softmax kernel for AMD MI300X-class CDNA GPUs.
    The kernel fuses softmax over expert logits, top-K expert selection, optional
    renormalization of weights, and token_expert_indices in FlyDSL.
    You MUST keep the kernel in FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.
    You MUST NOT add FastLauncher, ctypes dispatch bypass, _call_state_cache extraction,
    or any wrapper that bypasses JitFunction.__call__. Only optimize the GPU kernel
    computation itself (e.g. tile sizes, vectorization, memory access patterns, math).

platform_support:
  required_arch: gfx942
  runnable_on_gfx942: true
  status: active
