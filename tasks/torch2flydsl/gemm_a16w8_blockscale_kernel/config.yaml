task_type: torch2flydsl
source_file_path:
  - model.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 -c "import model; print('compile ok')"
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - flydsl_gemm_a16w8_blockscale
source_origin:
  repo: AITER (local)
  commit: e773193041689602e5431e110ef39db0390e7015
  path:
    - aiter/op_tests/triton_tests/gemm/basic/test_gemm_a16w8_blockscale.py
    - aiter/aiter/ops/triton/gemm/basic/gemm_a16w8_blockscale.py
  note: >-
    model.py is a pure-torch (b)-faithful reference for the BF16/FP8-blockscale
    GEMM (bf16 activation kept un-quantized, per-128x128 fp32 FP8 weight scales,
    fp32 accumulate, bf16 out) matching aiter's gemm_a16w8_blockscale
    (op_tests/triton_tests/gemm/basic/test_gemm_a16w8_blockscale.py run_torch,
    prequant=False path). The only aiter implementation of this op is the Triton
    kernel (no CK/FlyDSL standalone for gfx942/gfx950), so per the convention
    rule no kernel.py is shipped: FlyDSL is GEAK's target. The harness quantizes
    the weight via model.quantize_a16w8_blockscale and validates the reference
    against the real aiter Triton op (requires an FP8-capable GPU) on the
    non-shuffle path; shapes come from the op_test enum (square sweeps, DSR1
    router, GPT-OSS projections; N and K multiples of 128).
prompt:
  source_code: null
  instructions: |
    Author a FlyDSL kernel in kernel.py implementing the BF16/FP8-blockscale
    GEMM that the PyTorch `Model.forward` in model.py references: out = a @ w.T
    where `a` is [M, K] bf16 (consumed directly) and `w` is [N, K] quantized to
    FP8 (float8_e4m3fn) with one fp32 scale per 128x128 block
    ([ceil(N/128), ceil(K/128)]), dequantized and accumulated in fp32 with a
    bf16 output. Expose `flydsl_gemm_a16w8_blockscale(a, w)` as the entry point
    (it may quantize via the helpers in model.py for host-side prep). Keep the
    kernel in FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.
    Correctness and performance are checked with:
      python3 test_kernel_harness.py --correctness
      python3 test_kernel_harness.py --full-benchmark
  task_type: null
  cheatsheet: null
task_result_template: null
