task_type: torch2flydsl
source_file_path:
  - model.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 test_kernel_harness.py --compile
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - flydsl_gelu_tanh_and_mul
  - build_gelu_tanh_and_mul_module
source_origin:
  repo: AITER (local)
  commit: e773193041689602e5431e110ef39db0390e7015
  path:
    - aiter/ops/activation.py
    - csrc/kernels/activation_kernels.cu
  note: >-
    Model-only task. model.py is the pure-torch reference for the fused
    gelu_tanh_and_mul gated activation: input [m, 2*d] split into gate/up halves,
    out = gelu_tanh(gate) * up, where gelu_tanh is the tanh approximation
    0.5 * x * (1 + tanh(sqrt(2/pi) * (x + 0.044715 * x^3))) (PyTorch
    approximate="tanh"). The reference mirrors the aiter.gelu_tanh_and_mul device
    kernel: bf16 in/out, fp32 activation and multiply, bf16 store. The exact
    erf-based GELU is a separate op (gelu_and_mul) and is intentionally not used
    here. No standalone FlyDSL activation kernel exists in aiter, so kernel.py is
    left for the agent to author. The harness validates model.py against the real
    aiter.gelu_tanh_and_mul output at the bf16 tight gate. Real m x n shapes are
    taken from op_tests/test_activation.py.
prompt:
  source_code: null
  instructions: |
    Author a FlyDSL kernel in kernel.py that computes the fused
    gelu_tanh_and_mul gated activation defined by the PyTorch `Model.forward` in
    model.py: the input is a row-major [m, 2*d] bf16 tensor split along the last
    dim into a gate half x and an up half y; the output is [m, d] bf16 with
    out = gelu_tanh(x) * y, using the tanh approximation
    0.5 * x * (1 + tanh(sqrt(2/pi) * (x + 0.044715 * x^3))), computed with fp32
    activation/multiply and bf16 store.
    Expose `flydsl_gelu_tanh_and_mul(input)` returning the [m, d] bf16 output,
    plus `build_gelu_tanh_and_mul_module(...)` used to build the kernel.
    Keep the kernel in FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.
    Correctness and performance are checked with:
      python3 test_kernel_harness.py --correctness
      python3 test_kernel_harness.py --full-benchmark
  task_type: null
  cheatsheet: null
task_result_template: null
