source_file_path:
- kernel.py
target_kernel_functions:
- flydsl_moe_sorting
- build_moe_sorting_module
- _compile_moe_sorting_oneshot
compile_command:
- python3 -c "import torch; from kernel import build_moe_sorting_module; build_moe_sorting_module(num_experts=256,
