task_type: torch2flydsl
supported_archs:
  - gfx950  # FP4/MX scaled-MFMA is CDNA4-only; not runnable on gfx942/CDNA3
source_file_path:
  - model.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 test_kernel_harness.py --compile
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - flydsl_quant_mxfp4
  - build_quant_mxfp4_module
source_origin:
  repo: AITER (local)
  commit: e773193041689602e5431e110ef39db0390e7015
  path:
    - aiter/ops/quant.py
    - op_tests/test_quant_mxfp4.py
  note: >-
    Model-only task. model.py is the pure-torch reference for MXFP4 (E2M1)
    per-1x32 dynamic quantization: each contiguous 32-element block along the
    last dim shares one E8M0 power-of-two block scale ceil_pow2(amax/6) (project
    default round mode RoundUp / RCEIL), the 32 values are encoded as 4-bit E2M1
    codes (gfx950 HW round-to-nearest-even) packed two-per-byte, returning
    (packed float4_e2m1fn_x2 [m, n//2], scale float8_e8m0fnu [m, n//32]). The
    reference mirrors aiter.quant_mxfp4_hip / per_1x32_f4_quant and is byte-exact
    against the device op on gfx950 (validated by op_tests/test_quant_mxfp4.py).
    No standalone FlyDSL mxfp4-quant kernel exists in aiter (only MoE-fused quant
    paths), so kernel.py is left for the agent to author. The harness validates
    model.py against the real device op at an EXACT byte-for-byte gate (packed
    codes + E8M0 scales). Real m x n shapes are from op_tests/test_quant_mxfp4.py.
prompt:
  source_code: null
  instructions: |
    Author a FlyDSL kernel in kernel.py that computes the MXFP4 per-1x32 dynamic
    quantization defined by the PyTorch `Model.forward` in model.py: for a
    row-major [m, n] bf16 input (n a multiple of group_size=32), for each
    32-element block compute amax, derive the E8M0 block scale ceil_pow2(amax/6),
    encode each value as a 4-bit E2M1 code with round-to-nearest-even, and pack
    two codes per byte, returning (packed float4_e2m1fn_x2 [m, n//2], scale
    float8_e8m0fnu [m, n//32]).
    Expose `flydsl_quant_mxfp4(input, group_size=32)` returning the
    (packed, scale) tuple, plus `build_quant_mxfp4_module(...)` used to build the
    kernel. Keep the kernel in FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.
    Correctness and performance are checked with:
      python3 test_kernel_harness.py --correctness
      python3 test_kernel_harness.py --full-benchmark
  task_type: null
  cheatsheet: null
task_result_template: null
