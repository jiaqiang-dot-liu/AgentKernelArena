task_type: torch2flydsl
source_file_path:
  - model.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 test_kernel_harness.py --compile
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - flydsl_per_token_fp8_quant
  - build_per_token_fp8_quant_module
source_origin:
  repo: AITER (local)
  commit: e773193041689602e5431e110ef39db0390e7015
  path:
    - aiter/ops/quant.py
    - op_tests/test_quant.py
  note: >-
    Model-only task. model.py is the pure-torch reference for FP8 dynamic
    per-token quantization: each row of an [m, n] activation is rescaled into the
    OCP FP8 E4M3 (float8_e4m3fn, max 448) range by a dynamic per-row scale
    (amax/448; an all-zero row keeps scale 1) and cast to FP8 with
    round-to-nearest-even, returning (y_fp8 [m, n], scale_fp32 [m, 1]). The
    reference mirrors aiter.get_hip_quant(QuantType.per_Token) (the
    dynamic_per_token_scaled_quant device kernel) and is byte-exact against it on
    gfx950. No standalone FlyDSL per-token-quant kernel exists in aiter, so
    kernel.py is left for the agent to author. The harness validates model.py
    against the real device op at a tight quantized gate (near-exact scale + FP8
    codes within 1 ULP). Real m x n shapes are from op_tests/test_quant.py.
prompt:
  source_code: null
  instructions: |
    Author a FlyDSL kernel in kernel.py that computes the FP8 dynamic per-token
    quantization defined by the PyTorch `Model.forward` in model.py: for a
    row-major [m, n] bf16 input, compute a per-row amax, derive the fp32 scale
    amax/448 (FP8 E4M3 max; keep scale 1 for an all-zero row), then store
    y = round_to_nearest_even(x / scale) as float8_e4m3fn [m, n] and the fp32
    scale [m, 1].
    Expose `flydsl_per_token_fp8_quant(input)` returning the (y_fp8, scale_fp32)
    tuple, plus `build_per_token_fp8_quant_module(...)` used to build the kernel.
    Keep the kernel in FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.
    Correctness and performance are checked with:
      python3 test_kernel_harness.py --correctness
      python3 test_kernel_harness.py --full-benchmark
  task_type: null
  cheatsheet: null
task_result_template: null
