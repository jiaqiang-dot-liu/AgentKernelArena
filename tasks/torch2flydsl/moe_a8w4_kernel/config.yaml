task_type: torch2flydsl
supported_archs:
  - gfx950  # FP4/MX scaled-MFMA is CDNA4-only; not runnable on gfx942/CDNA3
source_file_path:
  - model.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 -c "import torch; from kernel import build_moe_stage1_module, build_moe_stage2_module; build_moe_stage1_module(model_dim=7168, inter_dim=256, experts=384, topk=8, tile_m=32, tile_n=256, tile_k=256, doweight_stage1=False, a_dtype='fp8', b_dtype='fp4', out_dtype='bf16'); build_moe_stage2_module(model_dim=7168, inter_dim=256, experts=384, topk=8, tile_m=32, tile_n=256, tile_k=256, doweight_stage2=True, a_dtype='fp8', b_dtype='fp4', out_dtype='bf16'); print('compile ok')"
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - flydsl_moe_a8w4
  - build_moe_stage1_module
  - build_moe_stage2_module
  - compile_mixed_moe_gemm1
  - compile_mixed_moe_gemm2
source_origin:
  repo: AITER (local)
  commit: 075c95f28383e6ca05fd829a21edb67083acb01c
  path:
    - aiter/ops/flydsl/kernels/mixed_moe_gemm_2stage.py
    - aiter/ops/flydsl/kernels/mfma_preshuffle_pipeline.py
    - aiter/ops/flydsl/kernels/mfma_epilogues.py
    - aiter/ops/flydsl/kernels/layout_utils.py
    - aiter/ops/flydsl/moe_common.py
    - aiter/ops/flydsl/moe_kernels.py
  note: >-
    PyTorch reference in model.py (quantized a8w4 fused MoE: fp8 activations +
    mxfp4 weights). FlyDSL target in kernel.py inlines the same AITER two-stage
    device kernels as the a4w4 moe_kernel task
    (compile_mixed_moe_gemm1 stage1 gate/up GEMM + fused silu-gated activation,
    compile_mixed_moe_gemm2 stage2 down GEMM + weighted top-k combine), with
    their device dependencies inlined. It imports flydsl directly and does NOT
    import any AITER device kernel. The ONLY difference vs moe_kernel is the
    host launcher (flydsl_moe_a8w4) and the stage runners: activations are
    quantized to MXFP8 (float8_e4m3fn, e8m0 per_1x32 scales) instead of mxfp4
    and a_dtype='fp8' is passed to the inline builders; expert weights stay
    mxfp4 (float4_e2m1fn_x2). mxfp8/mxfp4 quant, e8m0 scales, weight preshuffle
    and moe_sorting dispatch remain host-side prep (AITER utilities). Real
    fp8fp4 fmoe rows from
    aiter/configs/model_configs/kimik2_fp8fp4_untuned_fmoe.csv (Kimi-K2:
    D=7168, I=256, E=384, topk=8) and dsv4_fp8fp4_untuned_fmoe.csv (D=7168,
    I=512, E=385, topk=7) -- q_dtype_a=torch.float8_e4m3fn,
    q_dtype_w=torch.float4_e2m1fn_x2, QuantType.per_1x32, ActivationType.Silu.
prompt:
  source_code: null
  instructions: |
    Translate the PyTorch `Model.forward` in model.py (fused MoE: softmax
    router, top-k renormalized, per-expert gate/up GEMM + silu-gated activation,
    down GEMM, weighted top-k combine) into a FlyDSL kernel in kernel.py.
    The FlyDSL path is quantized a8w4: activations are MXFP8
    (torch.float8_e4m3fn) with e8m0 per_1x32 block scales, expert weights are
    MXFP4 (torch.float4_e2m1fn_x2) with e8m0 per_1x32 block scales and are
    pre-shuffled, and routing uses a sorted token/expert dispatch (moe_sorting);
    the stage1 output is re-quantized to MXFP8 before stage2; final output is
    bf16. Expose `flydsl_moe_a8w4(hidden_states, w1, w2, topk_weights,
    topk_ids, ...)`. Keep the kernel in FlyDSL — do NOT rewrite it in HIP,
    CUDA, or Triton. Correctness and performance are checked with:
      python3 test_kernel_harness.py --correctness
      python3 test_kernel_harness.py --full-benchmark
  task_type: null
  cheatsheet: null
task_result_template: null
