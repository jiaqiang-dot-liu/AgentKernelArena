task_type: torch2flydsl
source_file_path:
  - model.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 test_kernel_harness.py --compile
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - flydsl_silu_and_mul
  - build_silu_and_mul_module
source_origin:
  repo: AITER (local)
  commit: e773193041689602e5431e110ef39db0390e7015
  path:
    - aiter/ops/activation.py
    - csrc/kernels/activation_kernels.cu
  note: >-
    Model-only task. model.py is the pure-torch reference for the fused
    silu_and_mul gated activation: input [m, 2*d] split into gate/up halves,
    out = silu(gate) * up, with the optional GPT-OSS clamp (gate upper-clamped to
    limit, up clamped to [-limit, limit]) when limit > 0. The reference mirrors
    the aiter.silu_and_mul device kernel (silu_kernel + act_and_mul_kernel):
    bf16 in/out, fp32 activation and multiply, with the upper-clamped gate
    re-truncated to bf16 before silu on the limit path. No standalone FlyDSL
    activation kernel exists in aiter (only the MoE-fused silu_and_mul_fq quant
    variant), so kernel.py is left for the agent to author. The harness validates
    model.py against the real aiter.silu_and_mul output at the bf16 tight gate.
    Real m x n shapes are taken from op_tests/test_activation.py.
prompt:
  source_code: null
  instructions: |
    Author a FlyDSL kernel in kernel.py that computes the fused silu_and_mul
    gated activation defined by the PyTorch `Model.forward` in model.py: the
    input is a row-major [m, 2*d] bf16 tensor split along the last dim into a
    gate half x and an up half y; the output is [m, d] bf16 with
    out = silu(x) * y, computed with fp32 activation/multiply and bf16 store.
    When limit > 0, apply the GPT-OSS clamp: x = min(x, limit) (re-truncated to
    bf16 before silu) and y = clamp(y, -limit, limit).
    Expose `flydsl_silu_and_mul(input, limit=0.0)` returning the [m, d] bf16
    output, plus `build_silu_and_mul_module(...)` used to build the kernel.
    Keep the kernel in FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.
    Correctness and performance are checked with:
      python3 test_kernel_harness.py --correctness
      python3 test_kernel_harness.py --full-benchmark
  task_type: null
  cheatsheet: null
task_result_template: null
