task_type: torch2flydsl
supported_archs:
  - gfx950  # FP4/MX scaled-MFMA is CDNA4-only; not runnable on gfx942/CDNA3
source_file_path:
  - model.py
harness_path: test_kernel_harness.py
compile_command:
  - python3 -c "import model; print('compile ok')"
correctness_command:
  - python3 test_kernel_harness.py --correctness
performance_command:
  - python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
  - flydsl_gemm_a4w4
source_origin:
  repo: AITER (local)
  commit: e773193041689602e5431e110ef39db0390e7015
  path:
    - aiter/op_tests/test_gemm_a4w4.py
    - aiter/ops/gemm_op_a4w4.py
    - aiter/aiter/utility/fp4_utils.py
    - aiter/aiter/configs/model_configs/dsv3_a4w4_blockscale_tuned_gemm.csv
  note: >-
    model.py is a pure-torch (b)-faithful reference for the MXFP4 GEMM (e2m1
    values, e8m0 per-1x32 block scales along K with EVEN-mode rounding, fp32
    accumulate, bf16 out) matching aiter.gemm_a4w4 (op_tests/test_gemm_a4w4.py
    run_torch). The MXFP4 quantizer reproduces fp4_utils.dynamic_mxfp4_quant
    bit-for-bit, so the reference and the op consume identical operands. No clean
    standalone FlyDSL device kernel for this op exists for gfx942/gfx950 (only
    gfx1250 and the MoE grouped variants), so per the convention rule no kernel.py
    is shipped: FlyDSL is GEAK's target. The harness quantizes via aiter and
    validates the reference against the real aiter op; real shapes come from the
    dsv3 a4w4 tuned-gemm CSV.
prompt:
  source_code: null
  instructions: |
    Author a FlyDSL kernel in kernel.py implementing the MXFP4 GEMM that the
    PyTorch `Model.forward` in model.py references: out = a @ w.T where `a` is
    [M, K] and `w` is [N, K], both quantized to MXFP4 (e2m1 values with e8m0
    per-1x32 block scales along K, EVEN-mode scale), dequantized and accumulated
    in fp32, with a bf16 output. Expose `flydsl_gemm_a4w4(a, w)` as the entry
    point (it may quantize via aiter for host-side prep). Keep the kernel in
    FlyDSL — do NOT rewrite it in HIP, CUDA, or Triton.
    Correctness and performance are checked with:
      python3 test_kernel_harness.py --correctness
      python3 test_kernel_harness.py --full-benchmark
  task_type: null
  cheatsheet: null
task_result_template: null
