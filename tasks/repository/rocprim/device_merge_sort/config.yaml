repo_url: https://github.com/ROCm/rocPRIM.git
task_type: repository
repository_language: hip
# System packages for CMake build (Debian/Ubuntu). Use every_setup + guard so a cached clone still gets deps in a fresh container.
post_clone_install:
  - command -v cmake >/dev/null 2>&1 || (apt-get update && apt-get install -y cmake ninja-build)
post_clone_install_mode: every_setup
compile_command:
  - python3 scripts/task_runner.py compile
correctness_command:
  - python3 scripts/task_runner.py correctness
performance_command:
  - python3 scripts/task_runner.py performance
prompt:
  cheatsheet: null
  instructions: "Optimize device_merge_sort"