task_type: triton2triton
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _routing_sigmoid_top1_kernel
prompt:
  instructions: Optimize the fused sigmoid-gated top-1 MOE routing Triton kernel for
    AMD MI300X GPU. The kernel fuses GEMM (X @ W), sigmoid gating, and top-1 selection.
