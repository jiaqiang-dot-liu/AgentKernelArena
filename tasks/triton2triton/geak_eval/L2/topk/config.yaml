task_type: triton2triton
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _topk_kernel
- topk_stage1_kernel
- topk_stage2_kernel
prompt:
  instructions: >-
    Optimize the Top-K selection Triton kernel for AMD MI300X GPU. The
    kernel implements 1-stage (small M) and 2-stage (large M) selection.


    CRITICAL CONSTRAINTS:

    - Your optimized kernel MUST handle ALL test configurations in the full
    benchmark (--full-benchmark), not only those in the quick benchmark.
    The full benchmark tests approximately 80 configurations including very
    large shapes.

    - If you dispatch small shapes to PyTorch fallbacks, the Triton kernel must
    still correctly handle all remaining shapes. Do not assume the quick
    benchmark covers all cases.

    - Test with --full-benchmark before finalizing to catch shape-coverage gaps.
