task_type: triton2triton
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _rms_layernorm_forward
- _rms_layernorm_backward
- _gemma_rms_layernorm_forward
prompt:
  instructions: Optimize this Triton RMS LayerNorm kernel for AMD MI300X GPU. The
    kernel implements fast RMS layer normalization with forward, backward, and Gemma
    variants.
