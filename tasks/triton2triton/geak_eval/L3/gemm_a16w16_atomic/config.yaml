task_type: triton2triton
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _gemm_a16_w16_atomic_kernel
prompt:
  instructions: Optimize the atomic GEMM A16W16 Triton kernel for AMD MI300X GPU.
    Uses split-K with atomic reduction for improved parallelism on large matrices.
