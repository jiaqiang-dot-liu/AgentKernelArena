task_type: triton2triton
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _fused_rms_fp8_group_quant_kernel
- _fused_reduce_rms_fp8_group_quant_kernel
- _fused_flatten_fp8_group_quant_kernel
- _fused_reduce_act_mul_fp8_group_quant
prompt:
  instructions: Optimize the fused RMSNorm + FP8 quantization Triton kernel for AMD
    MI300X GPU. The kernel fuses RMSNorm normalization with FP8 quantization.
