task_type: triton2triton
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _gemm_a16wfp4_kernel
- _gemm_afp4wfp4_reduce_kernel
prompt:
  instructions: Optimize the GEMM A16WFP4 Triton kernel for AMD MI300X GPU. Mixed-precision
    matrix multiplication with FP4 weight quantization.
