task_type: triton2triton
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _fused_qkv_split_qk_rope_kernel
prompt:
  instructions: Optimize the fused QKV split + RoPE (Rotary Position Embedding) Triton
    kernel for AMD MI300X GPU. The kernel splits QKV projections and applies rotary
    position embeddings.
