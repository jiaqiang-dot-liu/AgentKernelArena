task_type: triton2triton
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _gemm_kernel
prompt:
  instructions: Optimize the GEMM (General Matrix Multiplication) Triton kernel for
    AMD MI300X GPU. The kernel computes Y = X @ W^T + bias with optional activation
    functions.
