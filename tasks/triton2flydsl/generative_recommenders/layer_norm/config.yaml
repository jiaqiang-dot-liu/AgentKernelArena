  note: >-
    Standalone, FORWARD-only extraction of Meta generative-recommenders' multi-row
    LayerNorm. Ports the two forward kernels `_layer_norm_fwd` (unweighted,
    mean-subtract + rstd-scale) and `_weighted_layer_norm_fwd` (affine
