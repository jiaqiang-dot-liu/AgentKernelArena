  url: https://github.com/sgl-project/sglang/blob/main/python/sglang/srt/layers/attention/fla/chunk_o.py
  note: >-
    Standalone, forward-only extraction of sglang's GDN chunked linear-attention
    OUTPUT kernel (chunk_fwd_o + chunk_fwd_kernel_o). Hot Triton kernel in the
    Gated Delta Net chunk-prefill pipeline on the Qwen3.5-35B-A3B serving path
    (chunk_fwd_kernel_o, ~10% of GDN prefill GPU time). `fla.op.exp`/`safe_exp`
    are inlined (exp=tl.exp), `prepare_chunk_indices` is inlined, and the
    commented-out autotune config lists (referencing check_shared_mem /
    is_nvidia_hopper) are dropped. Depends only on `triton` and `torch`. Both the
    IS_VARLEN and regular branches are kept in the kernel; the harness exercises
    the regular (non-varlen) path, whose per-chunk compute is identical to varlen.
prompt:
  source_code: null
  instructions: |
    Translate the Triton GDN chunked linear-attention OUTPUT kernel into an
    equivalent FlyDSL kernel for AMD GPUs (gfx950), preserving the public entry
    signature and numerical correctness.

    The source (`gdn_chunk_fwd_o.py`) is a STANDALONE extraction from sglang
    (python/sglang/srt/layers/attention/fla/chunk_o.py). It depends only on
    `triton` and `torch`. For each chunk (size BT=64) of a sequence and value
    head h (qk-head hg = h // (H // Hg)):
      b_o = q_c @ h_c^T                          # inter-chunk; h_c = per-chunk state [V,K]
      b_A = q_c @ k_c^T                          # intra-chunk
      if USE_G: b_o *= exp(g_c)[:,None];  b_A *= safe_exp(g_c[:,None]-g_c[None,:])
      b_A = tril(b_A)                            # causal within chunk (row>=col)
      b_o = b_o*scale + (b_A @ v_c)*scale
      o_c = b_o
    where safe_exp(x) = exp(x) if x<=0 else 0. fp32 accumulation; q/k are grouped
    (GVA, Hg<=H); the intra term casts b_A and v to bf16 before the matmul.

    Your FlyDSL implementation MUST:
    - Expose an entry point with the same signature as
      `chunk_fwd_o(q, k, v, h, g=None, scale=None, cu_seqlens=None, chunk_size=64)`
      returning o of shape [B, T, H, V].
    - Match the torch fp32 reference within bf16 tolerance (<=2% mismatched elems
      at atol=3e-2, rtol=1e-2).
    - Be written in FlyDSL (FlyDSL Python DSL) targeting AMD Instinct (gfx950) --
      do NOT simply re-tune the Triton kernel and do NOT rewrite it in HIP/CUDA.

    Validation:
    - `python3 test_kernel_harness.py --compile`        must PASS.
    - `python3 test_kernel_harness.py --correctness`    must PASS (all shapes).
    - `python3 test_kernel_harness.py --full-benchmark` must run and write the report.
  task_type: null
  cheatsheet: null
task_result_template: null
