source_file_path:
  - fav3_sage.py

target_kernel_functions:
  - fav3_sage
  - sage_fwd
  - sage_quant_kernel

compile_command:
  - python3 test_kernel_harness.py --compile

correctness_command:
  - python3 test_kernel_harness.py --correctness

performance_command:
  - python3 test_kernel_harness.py --full-benchmark

task_type: triton2flydsl

task_result_template: null

prompt:
  source_code: null
  instructions: |
    Translate the Triton SageAttention v1 kernel (INT8 Q/K + FP8 V flash
    attention) into an equivalent FlyDSL kernel for AMD GPUs, preserving the
    public entry signature and numerical correctness.

    The source (`source/fav3_sage.py`) is a STANDALONE extraction from AITER. It
    depends only on `triton` and `torch`. It implements the SageAttention v1
    forward path with two stages:
      - `sage_quant_kernel` / `_general_quant_kernel` : smooth-K, per-block INT8
        quantization of Q (pre-scaled by sm_scale/ln2) and K, and per-channel FP8
        quantization of V (the host `sage_quant(...)` wrapper drives these).
      - `sage_fwd` : flash-attention forward over the quantized operands. The QK
        product is an INT8 MFMA whose (q_descale * k_descale) descale is fused
        into a base-2 online softmax (USE_EXP2); the PV product casts the softmax
        probabilities to FP8 before the V matmul. Causal, sliding-window, GQA/MQA,
        and head-dim padding are supported. ALiBi / bias / dropout / block-sparse
        / varlen branches are present but unused by the entry point.
    The host wrapper `fav3_sage(...)` accepts high-precision (BF16/FP16/FP32)
    Q/K/V, quantizes internally, runs `sage_fwd`, and returns a BF16 output.

    Key features of the op:
    - Layout `bshd` ([batch, seqlen, heads, head_dim]); square self-attention
      (seqlen_q == seqlen_k) with causal masking and an optional causal sliding
      window.
    - SageAttention quantization: INT8 Q/K with per-block (BLOCK_M / BLOCK_N)
      descale, FP8 V with per-channel descale, K-smoothing (subtract the per-head
      sequence mean) which is softmax-invariant for the output.
    - Online-softmax accumulation done in the exp2 (base-2) domain; the PV matmul
      operates on FP8-cast probabilities and FP8 V.
    - GQA support (num_query_heads / num_kv_heads grouping) and head-dim padding
      to the next power of two.

    Your FlyDSL implementation MUST:
    - Expose an entry point with the same signature as `fav3_sage(...)`.
    - Match the Triton kernel (the reference). The harness runs the Triton kernel
      on all TEST_SHAPES and asserts finite output; the flydsl-vs-triton
      comparison is added when the FlyDSL target lands.
    - Be written in FlyDSL (FlyDSL Python DSL) targeting AMD Instinct (gfx950) —
      do NOT simply re-tune the Triton kernel and do NOT rewrite it in HIP/CUDA.

    Validation:
    - `python3 scripts/task_runner.py compile`     must PASS.
    - `python3 scripts/task_runner.py correctness` must PASS (all shapes).
    - `python3 scripts/task_runner.py performance` must run and write the report.
  cheatsheet: null
