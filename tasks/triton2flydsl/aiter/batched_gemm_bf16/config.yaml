  commit: e773193041689602e5431e110ef39db0390e7015
  path:
    - aiter/ops/triton/gemm/batched/batched_gemm_bf16.py
    - aiter/ops/triton/_triton_kernels/gemm/batched/batched_gemm_bf16.py
  note: >-
    Standalone extraction of AITER's batched 16-bit (bf16/fp16) GEMM Triton kernel
    (batched_gemm_bf16 -> _batched_gemm_bf16_kernel), Y[i] = X[i] @ W[i]^T (+ bias[i])
    over a batch, with fp32 accumulation, an optional per-batch bias, a 2D
    (batch, grouped-MN) grid, and bf16/fp16 output. The constexpr-aware kernel-naming
    helper (make_kernel_repr) is inlined and the on-disk tuned-config lookup
    (get_gemm_config("BATCHED_GEMM-A16W16", ...)) is replaced by a static 16-bit tile
    config, so the module depends only on triton + torch (this kernel has no split-K;
    the batch is the outer grid axis). The harness runs the Triton kernel over real
    batched GEMM shapes (B=16: small/decode/projection tiles plus minimal & irregular
    edge cases) and validates finiteness plus closeness to the fp32 torch reference at
    the upstream tolerance (atol=0.01, rtol=1e-2); the flydsl-vs-triton comparison is
    added when the FlyDSL target lands.
prompt:
  source_code: null
  instructions: |
    Translate the Triton batched 16-bit (bf16/fp16) GEMM kernel into an equivalent
    FlyDSL kernel for AMD GPUs (gfx942/gfx950), preserving the public entry
    signature and numerical correctness.

    The source (`batched_gemm_bf16.py`) is a STANDALONE extraction from AITER. It
    depends only on `triton` and `torch`. It implements:
      - `_batched_gemm_bf16_kernel` : tiled batched matmul C[i] = A[i] @ B[i]
        (B[i] is W[i] transposed to [K, N]) with fp32 accumulation, an optional
        per-batch bias added after the K loop, a 2D (batch, grouped-MN) grid, and
        EVEN_K heuristics for masked vs unmasked loads.
      - `batched_gemm_bf16(XQ, WQ, bias=None, dtype=torch.bfloat16, ...)` : transposes
        WQ, picks a tile config, allocates the output, and launches.

    Your FlyDSL implementation MUST:
    - Expose an entry point with the same signature as
      `batched_gemm_bf16(XQ, WQ, bias=None, ...)` computing Y[i] = X[i] @ W[i]^T (+ bias[i]).
    - Match the Triton kernel (the reference). The harness runs the Triton kernel on
      all TEST_SHAPES and checks finiteness + closeness to the fp32 torch reference.
    - Be written in FlyDSL targeting AMD Instinct -- do NOT simply re-tune the Triton
      kernel and do NOT rewrite it in HIP/CUDA.

    Validation:
    - `python3 test_kernel_harness.py --compile`        must PASS.
    - `python3 test_kernel_harness.py --correctness`    must PASS (all shapes).
    - `python3 test_kernel_harness.py --full-benchmark` must run and write the report.
  task_type: null
  cheatsheet: null
